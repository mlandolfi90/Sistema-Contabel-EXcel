<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel v2 — Sistema Contable</title>
<link rel="stylesheet" href="./css/base.css">
<link rel="stylesheet" href="./css/tags.css">
<link rel="stylesheet" href="./css/panel.css">
</head>
<body>
<div class="container">
<h1>Panel de pre-diseño v2 <span class="sync-badge">sync GitHub</span></h1>
<p class="subtitle">Las tarjetas viven como Issues. <a href="./mapa.html">→ Abrir mapa interactivo</a></p>

<div class="auth-bar">
  <span class="status-dot" id="auth-dot"></span>
  <span id="auth-status">Sin token</span>
  <input type="password" id="token-input" placeholder="Pegá tu GitHub Personal Access Token">
  <button class="btn" onclick="saveTokenBtn()">Guardar token</button>
  <button class="btn" onclick="clearTokenBtn()">Olvidar</button>
  <button class="btn" onclick="reload()">⟳ Recargar</button>
</div>

<div class="tabs">
  <button class="tab active" data-view="ideas" onclick="switchView('ideas')">Ideas de cambio <span id="ideas-count">0</span></button>
  <button class="tab" data-view="estructura" onclick="switchView('estructura')">Estructura del sistema</button>
</div>

<div id="view-ideas" class="view active">
  <div id="no-token-banner" class="banner" style="display:none;">
    ⚠ Sin token no podés crear ni mover tarjetas. <a href="https://github.com/settings/tokens?type=beta" target="_blank">Crear token</a> con <b>Issues: Read & Write</b> y <b>Contents: Read & Write</b>.
  </div>
  <div class="composer">
    <div class="composer-row"><input type="text" id="new-title" placeholder="Título de la idea"></div>
    <div class="composer-row"><textarea id="new-note" placeholder="Notas: qué cambia, por qué, qué impacto..."></textarea></div>
    <div class="composer-row">
      <label>Estado</label>
      <select id="new-status"></select>
      <label style="margin-left:12px;">Anclas</label>
      <span class="anchor-preview" id="anchor-preview">ninguna</span>
      <button class="btn" onclick="toggleAnchorPicker()">Seleccionar</button>
    </div>
    <div id="anchor-picker" class="anchor-picker">
      <div id="anchor-picker-content"></div>
    </div>
    <div class="composer-row" style="justify-content:flex-end; margin-top:10px;">
      <span class="save-status" id="save-status"></span>
      <button class="btn" onclick="resetComposer()">Limpiar</button>
      <button class="btn primary" id="save-btn" onclick="saveCard()">Crear Issue</button>
    </div>
  </div>
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="🔍 Buscar por título, nota o ancla (ej: tb_mayor, spread, #8)" autocomplete="off">
    <button class="btn" id="search-clear" title="Limpiar búsqueda" style="display:none;">✕</button>
  </div>
  <div class="toolbar" id="filters-bar"></div>
  <div class="kanban" id="kanban"></div>
</div>

<div id="view-estructura" class="view">
  <p style="font-size:12px; color: var(--text-tertiary);">Cada nodo viene de <code>schema.json</code>. Click para crear una idea anclada.</p>
  <div id="structure-content"></div>
</div>

</div>

<script type="module">
  import { init } from './js/panel/main.js';
  init();
</script>
</body>
</html>
